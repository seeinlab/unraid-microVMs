<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>microVM Console</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: #1c1c1c; color: #ccc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; }

#header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 12px;
  background: #262626;
  border-bottom: 1px solid #3a3a3a;
  height: 36px;
}
#header .title {
  font-size: 13px;
  font-weight: 600;
  color: #eee;
}
#header .title .vm-name {
  color: #4fc3f7;
}
#header .status {
  font-size: 12px;
  padding: 2px 8px;
  border-radius: 3px;
}
#header .status.connected { background: #1b5e20; color: #a5d6a7; }
#header .status.connecting { background: #e65100; color: #ffcc80; }
#header .status.disconnected { background: #b71c1c; color: #ef9a9a; }
#header .status.error { background: #b71c1c; color: #ef9a9a; }

#terminal-container {
  position: absolute;
  top: 36px;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 4px;
}

#error-overlay {
  display: none;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #2a2a2a;
  border: 1px solid #555;
  border-radius: 6px;
  padding: 24px 32px;
  text-align: center;
  z-index: 100;
}
#error-overlay h3 { color: #ef5350; margin-bottom: 10px; }
#error-overlay p { color: #aaa; font-size: 13px; margin-bottom: 16px; }
#error-overlay button {
  background: #4fc3f7;
  color: #000;
  border: none;
  padding: 8px 20px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
}
#error-overlay button:hover { background: #81d4fa; }
</style>
</head>
<body>
<div id="header">
  <span class="title">Console: <span class="vm-name" id="vm-name-display">—</span></span>
  <span class="status connecting" id="status-badge">Connecting...</span>
</div>
<div id="terminal-container"></div>
<div id="error-overlay">
  <h3 id="error-title">Connection Failed</h3>
  <p id="error-message">Unable to connect to the VM serial console.</p>
  <button onclick="reconnect()">Reconnect</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
<script>
(function() {
  // Parse URL params
  var params = new URLSearchParams(window.location.search);
  var vmName = params.get('name') || 'unknown';
  var wsUrl = params.get('ws') || null;   // Direct WebSocket URL (if using custom relay)
  var ttydUrl = params.get('ttyd') || null; // ttyd URL (redirect to ttyd's built-in UI)

  document.getElementById('vm-name-display').textContent = vmName;
  document.title = 'Console: ' + vmName;

  var statusBadge = document.getElementById('status-badge');
  var errorOverlay = document.getElementById('error-overlay');
  var errorTitle = document.getElementById('error-title');
  var errorMessage = document.getElementById('error-message');

  // If ttyd URL provided, redirect to ttyd's built-in web terminal
  if (ttydUrl && !wsUrl) {
    setStatus('connecting', 'Redirecting to ttyd...');
    window.location.href = ttydUrl;
    return;
  }

  // Initialize xterm.js terminal
  var term = new Terminal({
    cursorBlink: true,
    cursorStyle: 'block',
    fontSize: 14,
    fontFamily: '"Cascadia Code", "Fira Code", "JetBrains Mono", "Consolas", monospace',
    theme: {
      background: '#1c1c1c',
      foreground: '#d4d4d4',
      cursor: '#d4d4d4',
      cursorAccent: '#1c1c1c',
      selectionBackground: '#264f78',
      black: '#1c1c1c',
      red: '#f44747',
      green: '#6a9955',
      yellow: '#d7ba7d',
      blue: '#569cd6',
      magenta: '#c586c0',
      cyan: '#4ec9b0',
      white: '#d4d4d4',
      brightBlack: '#808080',
      brightRed: '#f44747',
      brightGreen: '#6a9955',
      brightYellow: '#d7ba7d',
      brightBlue: '#569cd6',
      brightMagenta: '#c586c0',
      brightCyan: '#4ec9b0',
      brightWhite: '#ffffff',
    },
    allowProposedApi: true,
  });

  var fitAddon = new FitAddon.FitAddon();
  var webLinksAddon = new WebLinksAddon.WebLinksAddon();
  term.loadAddon(fitAddon);
  term.loadAddon(webLinksAddon);

  var container = document.getElementById('terminal-container');
  term.open(container);
  fitAddon.fit();

  window.addEventListener('resize', function() { fitAddon.fit(); });

  var ws = null;
  var reconnectTimer = null;
  var reconnectAttempts = 0;
  var maxReconnectAttempts = 5;

  function setStatus(state, text) {
    statusBadge.className = 'status ' + state;
    statusBadge.textContent = text || state;
  }

  function showError(title, msg) {
    errorTitle.textContent = title;
    errorMessage.textContent = msg;
    errorOverlay.style.display = 'block';
  }

  function hideError() {
    errorOverlay.style.display = 'none';
  }

  function connect() {
    if (!wsUrl) {
      showError('No WebSocket URL', 'Console was opened without a WebSocket endpoint. Use the VM action menu to open the console.');
      setStatus('error', 'No endpoint');
      return;
    }

    hideError();
    setStatus('connecting', 'Connecting...');

    try {
      ws = new WebSocket(wsUrl);
    } catch (e) {
      showError('Connection Error', e.message);
      setStatus('error', 'Error');
      return;
    }

    ws.binaryType = 'arraybuffer';

    ws.onopen = function() {
      setStatus('connected', 'Connected');
      reconnectAttempts = 0;
      term.writeln('\r\n\x1b[32m--- Connected to ' + vmName + ' serial console ---\x1b[0m\r\n');
      term.focus();
    };

    ws.onmessage = function(event) {
      if (event.data instanceof ArrayBuffer) {
        term.write(new Uint8Array(event.data));
      } else {
        term.write(event.data);
      }
    };

    ws.onclose = function(event) {
      setStatus('disconnected', 'Disconnected');
      term.writeln('\r\n\x1b[31m--- Disconnected ---\x1b[0m');

      if (reconnectAttempts < maxReconnectAttempts) {
        reconnectAttempts++;
        var delay = Math.min(1000 * Math.pow(2, reconnectAttempts - 1), 10000);
        term.writeln('\x1b[33mReconnecting in ' + (delay/1000) + 's... (attempt ' + reconnectAttempts + '/' + maxReconnectAttempts + ')\x1b[0m');
        reconnectTimer = setTimeout(connect, delay);
      } else {
        showError('Connection Lost', 'Unable to reconnect after ' + maxReconnectAttempts + ' attempts. The VM may have stopped.');
      }
    };

    ws.onerror = function(event) {
      setStatus('error', 'Error');
    };

    // Send terminal input to WebSocket
    term.onData(function(data) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(data);
      }
    });
  }

  window.reconnect = function() {
    reconnectAttempts = 0;
    if (ws) {
      ws.close();
      ws = null;
    }
    connect();
  };

  // Start connection
  connect();
})();
</script>
</body>
</html>
